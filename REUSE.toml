# REUSE (https://reuse.software) annotations for files that do not carry an
# inline SPDX header. Hand-written C++/SystemVerilog sources under src/ and
# test/ carry their own SPDX-FileCopyrightText / SPDX-License-Identifier
# headers; the entries below cover everything else so the tree is 100 %
# REUSE-compliant. Verified with `reuse lint`.
version = 1

# --- Build system, CI, and repo metadata -------------------------------------
# Bazel build/workspace/module files, Starlark, CI, and project meta files. All
# authored by Tenstorrent and licensed the same as the rest of the project
# (Apache-2.0); they simply have no natural place for a comment header.
[[annotations]]
path = [
    ".bazelrc",
    ".gitignore",
    ".gitlab-ci.yml",
    "BUILD.bazel",
    "MODULE.bazel",
    "WORKSPACE",
    "WORKSPACE.bzlmod",
    "LICENSE_understanding.txt",
    "NOTICE",
    "**/BUILD.bazel",
    "**/MODULE.bazel",
    "**/WORKSPACE",
    "**/*.bzl",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Tenstorrent USA, Inc."
SPDX-License-Identifier = "Apache-2.0"

# --- Binary test fixtures ----------------------------------------------------
# Compiled/encoded test inputs (RISC-V binary, raw/hex/compressed forms). These
# are project-generated test data that cannot carry an inline comment header;
# their licensing is recorded here instead.
[[annotations]]
path = [
    "test/arith.bin",
    "test/arith.bin.lz4.gz",
    "test/arith.hex",
    "test/arith.riscv",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Tenstorrent USA, Inc."
SPDX-License-Identifier = "Apache-2.0"

# --- Documentation (CC BY 4.0) -----------------------------------------------
# Prose documentation is licensed under CC BY 4.0 (see LICENSE-DOCS), matching
# the project's split between code (Apache-2.0) and docs.
[[annotations]]
path = [
    "README.md",
    "CONTRIBUTING.md",
    "CODE_OF_CONDUCT.md",
    "SECURITY.md",
    ".github/CONTRIBUTING.md",
    ".github/CODE_OF_CONDUCT.md",
    ".github/SECURITY.md",
    ".github/ISSUE_TEMPLATE/**",
    ".github/PULL_REQUEST_TEMPLATE/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Tenstorrent USA, Inc."
SPDX-License-Identifier = "CC-BY-4.0"
