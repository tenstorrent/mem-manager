image:
  name: "ghcr.io/tenstorrent/cvm:0.1.3"

# The internal GitLab runner requires a JWT id_token to authenticate (e.g. to
# pull the CI image). Drop this block once CI moves to a public runner.
default:
    id_tokens:
        CI_JOB_JWT:
            aud: https://aus-gitlab.local.tenstorrent.com

stages:
    - test

# Enforce REUSE (https://reuse.software) licensing compliance: every file must
# carry an SPDX license/copyright header or be covered by REUSE.toml.
# Runs in the default cvm image (Debian bookworm, Python 3.11); reuse is
# installed into a venv because bookworm's system pip is PEP-668 managed. The
# [charset-normalizer] extra provides reuse's encoding detector in pure Python,
# so no libmagic/`file` system package is needed in the image.
# (The official fsfe/reuse image can't be used here: this runner ignores the
# image entrypoint override and passes its build script to reuse as a command.)
license-check:
    stage: test
    script:
        - python3 -m venv /tmp/reuse-venv
        - /tmp/reuse-venv/bin/pip install --quiet --no-cache-dir "reuse[charset-normalizer]==6.2.0"
        - /tmp/reuse-venv/bin/reuse lint

# Bazel 7 + bzlmod: full build + test, including the Verilated SystemVerilog
# testbench (rules_verilator is only wired under bzlmod).
test-bazel7:
    stage: test
    script:
        - bazel-7 --output_user_root=./bazel_output_user_root test //test:all --enable_bzlmod --test_output=all
    after_script:
        - chmod +w -R ./bazel_output_user_root

# Bazel 6 + WORKSPACE (no bzlmod): verifies the top-level exports still build
# under the shape downstream consumers (e.g. rv_tester) use — their own
# @rules_hdl, no bzlmod. @rules_verilator isn't available in WORKSPACE mode, so
# this builds //:all (the cc_library + verilog_library exports) only, like cvm.
build-bazel6-top:
    stage: test
    script:
        - bazel --output_user_root=./bazel_output_user_root build //:all
    after_script:
        - chmod +w -R ./bazel_output_user_root
